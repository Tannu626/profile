about_content: | 
  I've approx. 5 years' experience in Software Quality, where I've balanced hands-on manual testing with a strong focus on automation. I'm ISTQB certified and particularly proud of my work in my last role, where I helped reduce our production error rate by 30%. Beyond functional testing, I have experience in performance testing and a solid understanding of TDD/BDD practices. I'm a firm believer in the 'learning by doing' mindset and am always looking for ways to apply new technologies to improve product quality.

